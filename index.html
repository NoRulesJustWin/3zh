<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  .video-wrap { position: fixed; inset: 0; overflow: hidden; z-index: 1; }
  .video-wrap iframe {
    position: absolute;
    top: 50%; left: 50%;
    width: 100vw; height: 56.25vw; /* نسبة 16:9 */
    min-height: 100vh; min-width: 177.77vh; /* لملء كامل الشاشة */
    transform: translate(-50%, -50%);
    border: none;
  }
  
  /* تنسيق النص ليظهر فوق الفيديو */
  .overlay-message {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2; /* لضمان ظهوره فوق الفيديو */
    color: white;
    font-size: 3vw; /* حجم خط متجاوب */
    font-weight: bold;
    text-align: center;
    text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.9), -2px -2px 15px rgba(0, 0, 0, 0.9);
    pointer-events: none; /* حتى لا يعيق النقر على الفيديو */
    direction: rtl; /* اتجاه النص من اليمين لليسار */
  }

  /* تكبير الخط للشاشات الصغيرة */
  @media (max-width: 768px) {
    .overlay-message {
      font-size: 6vw;
    }
  }
</style>
</head>
<body>

<div class="video-wrap">
  <iframe 
    src="https://www.youtube.com/embed/bY38-mtTUg4?autoplay=1&mute=0&controls=0&loop=1&playlist=bY38-mtTUg4" 
    allow="autoplay; encrypted-media" 
    allowfullscreen>
  </iframe>
</div>

<!-- الجملة المضافة -->
<div class="overlay-message">
  عصابة gay بقيادة الحبوش يرسلون تحياتهم
</div>

</body>
</html>

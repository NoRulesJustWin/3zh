<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio & Image Player (1920x1080)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    /* تثبيت الأبعاد لتكون 1920 في 1080 بالضبط */
    width: 1920px;
    height: 1080px;
    margin: 0;
    overflow: hidden;
    
    /* الصورة الجديدة */
    background-image: url('https://e.top4top.io/p_383211ut21.png');
    background-position: center;
    background-repeat: no-repeat;
    /* لتتمدد الصورة وتغطي مساحة الـ 1920x1080 بالكامل */
    background-size: 100% 100%; 
    background-color: #000;
    
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  /* إخفاء مشغل الفيديو خارج الشاشة ليعمل كصوت فقط */
  .audio-only-wrap { 
    position: absolute; 
    top: -9999px; 
    left: -9999px; 
    width: 1px; 
    height: 1px; 
    opacity: 0;
    pointer-events: none; 
  }

  /* تنسيق النص ليظهر في منتصف الشاشة ذات دقة 1920x1080 */
  .overlay-message {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    color: white;
    font-size: 60px; /* حجم الخط */
    font-weight: bold;
    text-align: center;
    /* ظل قوي للنص ليكون مقروءاً بوضوح */
    text-shadow: 4px 4px 15px rgba(0, 0, 0, 1), -4px -4px 15px rgba(0, 0, 0, 1);
    pointer-events: none;
    direction: rtl;
    width: 1800px;
  }

</style>
</head>
<body>

<!-- مشغل اليوتيوب مخفي (الصوت الجديد) -->
<div class="audio-only-wrap">
  <iframe 
    width="10" height="10"
    /* تم استخراج معرف المقطع (UD_ZpPmlqaE) وتضمينه هنا ليعمل تلقائياً ويتكرر */
    src="https://www.youtube.com/embed/UD_ZpPmlqaE?autoplay=1&mute=0&controls=0&loop=1&playlist=UD_ZpPmlqaE" 
    allow="autoplay; encrypted-media" 
    allowfullscreen>
  </iframe>
</div>

<!-- الجملة المضافة -->
<div class="overlay-message">
يعطيكم العافيه انا بنام بجيكم العصر و الليل 
</div>

</body>
</html>

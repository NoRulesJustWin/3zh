<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio & Image Player (1920x1080)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    /* تثبيت الأبعاد لتكون 1920 في 1080 بالضبط */
    width: 1920px;
    height: 1080px;
    margin: 0;
    overflow: hidden;
    
    /* إعدادات الصورة */
    background-image: url('https://e.top4top.io/p_38328bdnj1.png');
    background-position: center;
    background-repeat: no-repeat;
    /* 100% لكي تتمدد الصورة وتغطي مساحة الـ 1920x1080 بالكامل */
    background-size: 100% 100%; 
    background-color: #000;
    
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  /* إخفاء مشغل الفيديو خارج الشاشة ليعمل كصوت فقط */
  .audio-only-wrap { 
    position: absolute; 
    top: -9999px; 
    left: -9999px; 
    width: 1px; 
    height: 1px; 
    opacity: 0;
    pointer-events: none; 
  }

  /* تنسيق النص ليظهر في منتصف الشاشة ذات دقة 1920x1080 */
  .overlay-message {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    color: white;
    font-size: 60px; /* استخدام حجم خط ثابت يتناسب مع الشاشة الكبيرة */
    font-weight: bold;
    text-align: center;
    /* ظل قوي للنص */
    text-shadow: 4px 4px 15px rgba(0, 0, 0, 1), -4px -4px 15px rgba(0, 0, 0, 1);
    pointer-events: none;
    direction: rtl;
    width: 1800px; /* لتجنب تلامس النص مع الحواف */
  }

</style>
</head>
<body>

<!-- مشغل اليوتيوب مخفي (الصوت فقط) -->
<div class="audio-only-wrap">
  <iframe 
    width="10" height="10"
    src="https://www.youtube.com/embed/bY38-mtTUg4?autoplay=1&mute=0&controls=0&loop=1&playlist=bY38-mtTUg4" 
    allow="autoplay; encrypted-media" 
    allowfullscreen>
  </iframe>
</div>

<!-- الجملة -->
<div class="overlay-message">
      ابو كشه i love
   +   عصابة gay بقيادة الحبوش يرسلون تحياتهم
 + ابو متعب يسلم عليكم
</div>

</body>
</html>

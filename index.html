<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio & Image Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    /* إعداد الصورة لتكون خلفية تملأ الشاشة بالكامل */
    background-image: url('https://e.top4top.io/p_38328bdnj1.png');
    background-position: center;
    background-repeat: no-repeat;
    background-size: cover;
    background-attachment: fixed;
    background-color: #000;
    
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  /* إخفاء مشغل الفيديو خارج الشاشة ليعمل كصوت فقط */
  .audio-only-wrap { 
    position: absolute; 
    top: -9999px; 
    left: -9999px; 
    width: 1px; 
    height: 1px; 
    opacity: 0;
    pointer-events: none; 
  }

  /* تنسيق النص ليظهر فوق الصورة */
  .overlay-message {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    color: white;
    font-size: 3vw;
    font-weight: bold;
    text-align: center;
    /* ظل قوي ليظل النص مقروءاً حتى لو كانت الصورة فاتحة */
    text-shadow: 3px 3px 15px rgba(0, 0, 0, 1), -3px -3px 15px rgba(0, 0, 0, 1);
    pointer-events: none;
    direction: rtl;
    width: 90%; /* لمنع خروج النص من الشاشة */
  }

  /* تكبير الخط للشاشات الصغيرة كالجوالات */
  @media (max-width: 768px) {
    .overlay-message {
      font-size: 7vw;
    }
  }
</style>
</head>
<body>

<!-- مشغل اليوتيوب مخفي (الصوت فقط) -->
<div class="audio-only-wrap">
  <iframe 
    width="10" height="10"
    src="https://www.youtube.com/embed/bY38-mtTUg4?autoplay=1&mute=0&controls=0&loop=1&playlist=bY38-mtTUg4" 
    allow="autoplay; encrypted-media" 
    allowfullscreen>
  </iframe>
</div>

<!-- الجملة المضافة -->
<div class="overlay-message">
  عصابة gay بقيادة الحبوش يرسلون تحياتهم
</div>

</body>
</html>
